<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор подання про втрату</title>
    <script src="mgrs.js"></script>
    <script src="database.js"></script>
    <style>
        /* 🎨 КРОК 1: Змінні кольорів для світлої та темної тем */
        :root {
            --font-main: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --primary-color: #4CAF50;
            --secondary-color: #757575;
            
            /* Світла тема (за замовчуванням) */
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --result-bg: #e7f3fe;
            --result-border: #2196F3;
            --tooltip-bg: #333333;
            --tooltip-text: #ffffff;
        }

        /* Темна тема */
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --input-bg: #2d2d2d;
            --input-border: #555555;
            --result-bg: #1e2a38;
            --result-border: #3498db;
            --tooltip-bg: #555555;
            --tooltip-text: #eeeeee;
        }
        
        body { 
            font-family: var(--font-main); 
            padding: 20px; 
            max-width: 650px; 
            margin: auto; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s; /* Плавний перехід */
        }

        /* Перемикач теми */
        .theme-switch {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        
        .theme-switch select {
            width: auto;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* Адаптивний дизайн: контейнер для рядків */
        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Колонки в рядку */
        .col {
            flex: 1;
            min-width: 200px;
        }
        
        .col-small {
            flex: 0.5;
            min-width: 100px;
        }

        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            font-size: 14px; 
        }
        
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid var(--input-border); 
            border-radius: 6px; 
            font-family: var(--font-main);
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        
        /* Клікабельний курсор для потрібних полів */
        input[type="date"], input[type="time"], select { cursor: pointer; }
        input[type="text"] { cursor: text; }
        
        /* Стилі кнопок */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button { 
            flex: 1;
            min-width: 200px;
            color: white; 
            padding: 12px 15px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: #45a049; }
        
        .btn-secondary { background-color: var(--secondary-color); }
        .btn-secondary:hover { background-color: #5a5a5a; }
        
        .result-box { 
            margin-top: 25px; 
            padding: 15px; 
            background-color: var(--result-bg); 
            border-left: 6px solid var(--result-border); 
            border-radius: 4px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* Стилі для спливаючих підказок (Tooltip) */
        .tooltip-icon {
            cursor: help;
            position: relative;
            display: inline-block;
            margin-left: 5px;
            font-size: 14px;
        }

        .tooltip-icon .tooltiptext {
            visibility: hidden;
            width: 280px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: left;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 150%;
            left: 50%;
            margin-left: -140px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            font-weight: 400;
            line-height: 1.4;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }

        .tooltip-icon .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        .tooltip-icon:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- 🎛️ КРОК 2: Меню перемикання теми -->
    <div class="theme-switch">
       <!--  <label for="themeSelect" style="margin-bottom: 0;">Тема:</label>  -->
        <select id="themeSelect" onchange="setTheme(this.value)">
            <option value="auto">🌓 </option>
            <option value="light">☀️ </option>
            <option value="dark">🌙 </option>
        </select>
    </div>

    <h2>Генератор подання на втрату БПЛА</h2>

    <form id="generatorForm" onsubmit="event.preventDefault(); generateText();">

        <div class="row">
            <div class="form-group col">
                <label>Дата:</label>
                <select id="dateSelect" required></select>
            </div>
            <div class="form-group col-small">
                <label>Година:</label>
                <select id="hourSelect" required></select>
            </div>
            <div class="form-group col-small">
                <label>Хвилина:</label>
                <select id="minuteSelect" required></select>
            </div>
        </div>

        <div class="form-group">
            <label>Тип завдання:</label>
            <select id="missionType" required>
                <option value="під час розвідувального польоту">під час розвідувального польоту</option>
                <option value="під час бойового вильоту">під час бойового вильоту</option>
                <option value="під час нанесення бойового ураження">під час нанесення бойового ураження</option>
            </select>
        </div>

        <div class="row">
            <div class="form-group col">
                <label>Населений пункт, область (через кому):</label>
                <input type="text" id="location" placeholder="Роботине, Запорізької області" required>
            </div>

            <div class="form-group col">
                <label>Координата (MGRS):</label>
                <input type="text" id="coords" placeholder="36U YA 12345 67890" required>
            </div>
        </div>

        <div class="form-group">
            <label>Причина втрати:</label>
            <select id="reason" required>
                <option value="внаслідок дії засобів РЕБ противника">внаслідок дії засобів РЕБ противника</option>
                <option value="внаслідок обстрілу зі стрілецької зброї противником">внаслідок обстрілу зі стрілецької зброї</option>
                <option value="внаслідок дії ППО противника">внаслідок дії ППО противника</option>
            </select>
        </div>

        <div class="row">
            <div class="form-group col">
                <label>Тип БПЛА:</label>
                <select id="droneType" onchange="updateBattery()" required>
                    <option value="DJI Mavic 3">DJI Mavic 3</option>
                    <option value="DJI Mavic 3 TA">DJI Mavic 3 TA</option>
                    <option value="DJI Mavic 3 Thermal">DJI Mavic 3 Thermal</option>
                    <option value="DJI Mavic 3 Enterprise">DJI Mavic 3 Enterprise</option>
                    <option value="DJI Mavic 3 PRO">DJI Mavic 3 PRO</option>
                    <option value="DJI Mavic 3 Classic">DJI Mavic 3 Classic</option>
                    <option value="DJI Mavic 3 Fly More Combo">DJI Mavic 3 Fly More Combo</option>
                    <option value="DJI Matrice 4Т">DJI Matrice 4Т</option>
                    <option value="DJI Matrice 4E">DJI Matrice 4E</option>
                    <option value="Autel EVO MAX 4T">Autel EVO MAX 4T</option>
                </select>
            </div>
            
            <div class="form-group col">
                <label>Номер БПЛА:
            <span class="tooltip-icon" style="float: right;">ℹ️
                        <span class="tooltiptext">
                            - Номер дрона брати з бокса. При отриманні на складі служби, звіряти номер бокса та дрона!<br><br>
                            - Не подавати дрони, що не стали на облік. Доповідати тільки після постановки на облік.
                        </span>
                    </span>
                </label>
                <input type="text" id="propNumber" placeholder="1581F..." required>
            </div>

            <div class="form-group col-small">
                <label>Одиниця:
            <span class="tooltip-icon" style="float: right;">ℹ️
                        <span class="tooltiptext">
                            - Якщо дрон на обліку як 1 "к-т" і був втрачений в польоті то доповідаємо 1 шт.<br><br>
                            - Якщо дрон на обліку як 1 од. і був втрачений в польоті то доповідаємо 1 "од."<br><br>
                            - Якщо дрон на обліку як 1 шт. і був втрачений в польоті то доповідаємо 1 "шт."<br>
                            ---<br>
                            У дронів що на обліку як 1 к-т залишаються комплектуючі, їх необхідно облікувати і подавати на втрату окремо.
                        </span>
                    </span>
                </label>
                <select id="unitType" required>
                    <option value="шт.">шт.</option>
                    <option value="од.">од.</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>АКБ до БПЛА:</label>
            <input type="text" id="batteryType" placeholder="Flight Battery" required>
        </div>

        <!-- Кнопки керування -->
        <div class="button-group">
            <button type="submit" class="btn-primary">Згенерувати подання</button>
            <button type="button" class="btn-secondary" onclick="resetForm()">Нове подання</button>
        </div>

    </form>

    <div class="result-box">
        <label>Готове подання:
            <span class="tooltip-icon" style="float: right;">ℹ️
                <span class="tooltiptext">Не придумувати нічого свого. Копіювати зі зразка!</span>
            </span>
        </label>
        <textarea id="outputText" rows="5" readonly></textarea>
        <button onclick="copyText()" style="margin-top: 10px; background-color: #008CBA; width: 100%;">Копіювати в буфер</button>
    </div>

    <script>
        // ⚙️ КРОК 3: Логіка роботи теми
        function applyTheme(theme) {
            if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        function setTheme(theme) {
            localStorage.setItem('appTheme', theme); // Зберігаємо вибір
            applyTheme(theme);
        }

        // Запуск при завантаженні: перевіряємо, що було збережено раніше
        const savedTheme = localStorage.getItem('appTheme') || 'auto';
        document.getElementById('themeSelect').value = savedTheme;
        applyTheme(savedTheme);

        // Слухаємо зміни системної теми (якщо стоїть "Автоматично")
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (localStorage.getItem('appTheme') === 'auto' || !localStorage.getItem('appTheme')) {
                applyTheme('auto');
            }
        });

        // ==========================================
        // ІСНУЮЧА ЛОГІКА ДОДАТКУ (БЕЗ ЗМІН)
        // ==========================================

        function updateBattery() {
            const drone = document.getElementById("droneType").value;
            const batteryInput = document.getElementById("batteryType");
            
            if (drone.includes("Mavic 3")) {
                batteryInput.value = "DJI Intelligent Flight Battery for Mavic";
            } else if (drone.includes("Matrice")) {
                batteryInput.value = "DJI Matrice 4 Series";
            } else if (drone.includes("Autel")) {
                batteryInput.value = "Autel EVO Max 4T Battery";
            } else {
                batteryInput.value = "";
            }
        }

        function populateDateTimeOptions() {
            const dateSelect = document.getElementById("dateSelect");
            dateSelect.innerHTML = "";
            const today = new Date();
            
            for (let i = 0; i < 30; i++) {
                const d = new Date();
                d.setDate(today.getDate() - i);
                
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                const value = `${day}.${month}.${year}`;
                
                let label = value;
                if (i === 0) label += " (Сьогодні)";
                else if (i === 1) label += " (Вчора)";
                else if (i === 2) label += " (Позавчора)";
                
                const opt = document.createElement("option");
                opt.value = value;
                opt.textContent = label;
                dateSelect.appendChild(opt);
            }
            
            const hourSelect = document.getElementById("hourSelect");
            hourSelect.innerHTML = "";
            for (let h = 0; h < 24; h++) {
                const hourStr = String(h).padStart(2, '0');
                const opt = document.createElement("option");
                opt.value = hourStr;
                opt.textContent = `${hourStr} год`;
                hourSelect.appendChild(opt);
            }
            
            const minuteSelect = document.getElementById("minuteSelect");
            minuteSelect.innerHTML = "";
            for (let m = 0; m < 60; m++) {
                const minStr = String(m).padStart(2, '0');
                const opt = document.createElement("option");
                opt.value = minStr;
                opt.textContent = `${minStr} хв`;
                minuteSelect.appendChild(opt);
            }
        }

        function setDateTimeAndBattery() {
            populateDateTimeOptions();
            
            const today = new Date();
            
            document.getElementById("dateSelect").selectedIndex = 0;
            
            const hours = String(today.getHours()).padStart(2, '0');
            document.getElementById("hourSelect").value = hours;
            
            const minutes = String(today.getMinutes()).padStart(2, '0');
            document.getElementById("minuteSelect").value = minutes;

            updateBattery();
        }

        function updateLocationFromCoords() {
            const coordsInput = document.getElementById("coords");
            let rawStr = coordsInput.value.trim().toUpperCase();
            if (!rawStr) return;

            const cyrillicToLatinMap = {
                'А': 'A', 'В': 'B', 'С': 'C', 'Е': 'E', 'Н': 'H', 'І': 'I', 'К': 'K', 'М': 'M', 'О': 'O', 'Р': 'P', 'Т': 'T', 'Х': 'X', 'У': 'U' 
            };

            const coordsStr = rawStr.replace(/[АВСЕНІКМОРТХУ]/g, function(match) {
                return cyrillicToLatinMap[match];
            });

            const mgrsRegex = /^(36[TUV]|37[TU])\s?[A-Z]{2}\s?\d{2,5}\s?\d{2,5}$/;
            if (!mgrsRegex.test(coordsStr)) {
                return;
            }

            try {
                if (typeof mgrs === 'undefined') {
                    console.warn("Бібліотека MGRS не завантажена.");
                    return;
                }
                const point = mgrs.toPoint(coordsStr);
                const targetLon = point[0];
                const targetLat = point[1];

                if (typeof myData === 'undefined' || !myData.elements) {
                    console.warn("База даних локацій не завантажена.");
                    return;
                }

                let nearestElement = null;
                let minDistanceSq = Infinity;

                for (let i = 0; i < myData.elements.length; i++) {
                    const el = myData.elements[i];
                    const lat = el[0];
                    const lon = el[1];
                    const distSq = (lat - targetLat) ** 2 + (lon - targetLon) ** 2;
                    if (distSq < minDistanceSq) {
                        minDistanceSq = distSq;
                        nearestElement = el;
                    }
                }

                if (nearestElement) {
                    const name = nearestElement[2];
                    const region = nearestElement[3];
                    document.getElementById("location").value = `${name}, ${region}`;
                }
            } catch (e) {
                console.error("Помилка при розрахунку найближчого населеного пункту:", e);
            }
        }

        window.onload = function() {
            setDateTimeAndBattery();
            document.getElementById("coords").addEventListener("input", updateLocationFromCoords);
        };

        function resetForm() {
            document.getElementById("generatorForm").reset(); 
            document.getElementById("outputText").value = ""; 
            setDateTimeAndBattery(); 
        }

        function generateText() {
            let rawStr = document.getElementById("coords").value.trim().toUpperCase();

            const cyrillicToLatinMap = {
                'А': 'A', 'В': 'B', 'С': 'C', 'Е': 'E', 'Н': 'H', 'І': 'I', 'К': 'K', 'М': 'M', 'О': 'O', 'Р': 'P', 'Т': 'T', 'Х': 'X', 'У': 'U' 
            };

            const coordsStr = rawStr.replace(/[АВСЕНІКМОРТХУ]/g, function(match) {
                return cyrillicToLatinMap[match];
            });

            const mgrsRegex = /^(36[TUV]|37[TU])\s?[A-Z]{2}\s?\d{2,5}\s?\d{2,5}$/;
            
            if (!mgrsRegex.test(coordsStr)) {
                alert("Помилка! Координати мають бути у форматі MGRS та знаходитись у вказаних областях (зони 36T, 36U, 36V, 37T, 37U).\nПриклад правильного введення: 36U YA 12345 67890");
                return; 
            }

            const date = document.getElementById("dateSelect").value;

            const rawLocation = document.getElementById("location").value.trim();
            let finalLocation = rawLocation;
            const locParts = rawLocation.split(',');
            
            if (locParts.length > 1) {
                finalLocation = locParts[0].toUpperCase() + ',' + locParts.slice(1).join(',');
            } else {
                finalLocation = rawLocation.toUpperCase();
            }

            const hour = document.getElementById("hourSelect").value;
            const minute = document.getElementById("minuteSelect").value;
            const time = `${hour}:${minute}`;

            const missionType = document.getElementById("missionType").value;
            const reason = document.getElementById("reason").value;
            const droneType = document.getElementById("droneType").value;
            const propNumber = document.getElementById("propNumber").value;
            const unitType = document.getElementById("unitType").value;
            const batteryType = document.getElementById("batteryType").value;

            const result = `${date} о ${time}, ${missionType} поблизу н.п. ${finalLocation} (${coordsStr}), ${reason}, було втрачено майно РР 95 одшбр, а саме: БПЛА ${droneType} № ${propNumber} з акумуляторною батареєю ${batteryType} – 1 ${unitType} (СА та ППО).`;

            document.getElementById("outputText").value = result;
        }

        function copyText() {
            const textToCopy = document.getElementById("outputText");
            if (textToCopy.value === "") {
                alert("Спочатку згенеруйте текст!");
                return;
            }
            textToCopy.select();
            document.execCommand("copy");
            alert("Текст скопійовано! Можете вставляти в документ або месенджер.");
        }
    </script>

</body>
</html>
